<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 - Nested Divs</title>
    <style>
        #outer {
            font-size: 25px; /* Outer div text size */
            background-color: #f0f0f0; /* Optional, for visibility */
            padding: 10px;
        }
        #inner {
            font-size: 10px; /* Inner div text size */
            background-color: #d0d0d0; /* Optional, for visibility */
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="outer">
        Outer
        <div id="inner">
            Inner
        </div>
    </div>
</body>
</html>
