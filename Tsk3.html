<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3</title>
    <style>
        .green-btn {
            background-color: green;
        }
    </style>
</head>
<body>

    <!-- Green button using external CSS stylesheet -->
    <button class="green-btn">Green Button</button>

    <!-- Blue button using <style> tag -->
    <button style="background-color: blue; color: white;">Blue Button</button>

    <!-- Pink button using inline style -->
    <button style="background-color: pink; color: black;">Pink Button</button>

</body>
</html>
